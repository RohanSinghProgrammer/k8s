apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-app-deployment
  namespace: nginx
  labels:
    app: express-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: express-app
  template:
    metadata:
      labels:
        app: express-app
    spec:
      containers:
      - name: express-app
        image: ayushayush/express-app:latest
        ports:
        - containerPort: 8000
